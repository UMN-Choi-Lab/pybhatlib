name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -m "not slow" -v

  notebooks:
    name: tutorial notebooks are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate notebooks from source scripts
        run: python examples/tutorials/_convert_to_ipynb.py

      - name: Fail if notebooks are stale or missing
        run: |
          # --porcelain catches both modified tracked notebooks and brand-new
          # untracked ones (a .py script added without its generated .ipynb).
          changed=$(git status --porcelain -- examples/tutorials/'*.ipynb')
          if [ -n "$changed" ]; then
            echo "::error::Tutorial notebooks are out of sync with their python_scripts/*.py sources."
            echo "Run 'python examples/tutorials/_convert_to_ipynb.py' and commit the result."
            echo "$changed"
            exit 1
          fi
          echo "All tutorial notebooks are in sync."
