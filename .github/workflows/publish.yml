name: publish

# Trusted Publishing (PyPI OIDC) — no API tokens are stored anywhere.
#   * pushing a v* tag   -> builds + uploads to TestPyPI (dry run)
#   * publishing a GitHub Release -> builds + uploads to real PyPI
# The same built artifacts are reused across jobs, so the exact bytes tested on
# TestPyPI are what ship to PyPI.
#
# One-time setup (see CHANGELOG / release notes):
#   1. Register a "pending publisher" on PyPI and TestPyPI:
#        Owner = UMN-Choi-Lab, Repository = pybhatlib,
#        Workflow = publish.yml, Environment = pypi (PyPI) / testpypi (TestPyPI)
#   2. Create GitHub environments named exactly `pypi` and `testpypi`
#      (optionally add a required-reviewer rule on `pypi`).

on:
  push:
    tags:
      - "v*"            # e.g. v0.3.1 -> TestPyPI dry run
  release:
    types: [published]  # GitHub Release -> real PyPI

permissions: {}         # tighten the default; each job opts in below

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for hatchling's VCS file selection
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Guard — no proprietary/large/secret files in the sdist
        run: |
          if tar tzf dist/*.tar.gz | grep -iE 'GAUSS|\.env|experiments/|pr32-'; then
            echo '::error::sdist contains files that must not be published'; exit 1
          fi
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    name: Publish to TestPyPI (dry run on tag)
    needs: build
    if: github.event_name == 'push'   # tag push only
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pybhatlib/
    permissions:
      id-token: write   # OIDC — mints a short-lived token, nothing stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true   # allow re-tagging the same version while testing

  pypi:
    name: Publish to PyPI (on GitHub Release)
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pybhatlib/
    permissions:
      id-token: write   # OIDC — no stored secrets
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1   # defaults to real PyPI
